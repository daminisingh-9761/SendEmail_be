version: "3.9"
services:
  mongodb:
    image: mongo:6
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on: [mongodb]

volumes:
  mongodata:
